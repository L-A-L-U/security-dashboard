services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command: >
      sh -c "pip install fastapi uvicorn psutil websockets python-dotenv psycopg2-binary -q &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    network_mode: host
    restart: always
    privileged: true

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "8081:80"
    restart: always
